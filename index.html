  <script>


    function preloadImagesWithLoading(files, basePath = "assets/") {
      const loadingEl = document.querySelector(".loading");
      const fillEl = loadingEl.querySelector(".loading-fill");

      let loadedCount = 0;
      const totalCount = files.length;

      function updateLoadingBar() {
        const percent = totalCount === 0 ? 100 : (loadedCount / totalCount) * 100;
        fillEl.style.clipPath = `inset(${100 - percent}% 0 0 0)`;
      }

      updateLoadingBar();

      return Promise.allSettled(
        files.map((file) => {
          return new Promise((resolve) => {
            const img = new Image();

            const done = async () => {
              loadedCount++;
              updateLoadingBar();
              resolve(file);

            };

            img.onload = done;
            img.onerror = done;
            img.src = basePath + file;
          });
        }),
      );
    }

<body>
  <div style="display: none;" class="vignette"></div>
  <div style="display: none;" class="background"></div>
  <div style="display: none;" class="app">
    <div class="tabs-container">
      <div class="tabs">
        <div class="tabs-left" id="patientTabs"></div>
        <div class="tabs-right">
          <button class="tab" id="allPatientsTab" type="button">All patients</button>
        </div>
      </div>
    </div>
    <div class="journal-container">
      <div class="journal-layout">
        <main class="journal" aria-label="Medical chart journal">
          <section class="page left-page">
            <h1 class="header-title">Medical Chart</h1>
            <div class="identity col">
              <div class="field">
                <span class="field-label">Name</span>
                <span class="field-value" id="fieldName"></span>
              </div>
              <div class="row">
                <div class="photo-frame">
                  <img id="patientPhoto" src="assets/patient_01.png" alt="Patient portrait" />
                </div>

                <div class="fields">
                  <div class="field">
                    <span class="field-label">Age</span><span class="field-value" id="fieldAge"></span>
                  </div>
                  <div class="field">
                    <span class="field-label">Marital Status</span><span class="field-value" id="fieldMarital"></span>
                  </div>
                  <div class="field">
                    <span class="field-label">Occupation</span><span class="field-value" id="fieldOccupation"></span>
                  </div>
                  <div class="field">
                    <span class="field-label">Date of Admission</span><span class="field-value"
                      id="fieldAdmission"></span>
                  </div>
                  <div class="field">
                    <span class="field-label">Residence</span><span class="field-value" id="fieldResidence"></span>
                  </div>
                </div>
              </div>
            </div>

            <section class="col">
              <h2 class="section-title">Anamnesis Morbi</h2>
              <div class="notes">
                <div class="notes-block">
                  <div class="lined-row">
                    <span class="lined-label">Harmful Habits</span>
                    <span class="lined-value" id="fieldHarmfulHabits"></span>
                  </div>
                  <div class="multiline" id="harmfulHabitsLines"></div>
                </div>
                <div class="notes-block">
                  <div class="lined-row">
                    <span class="lined-label">Clinical picture</span>
                    <span class="lined-value" id="fieldClinicalPicture"></span>
                  </div>
                  <div class="multiline" id="clinicalPictureLines"></div>
                </div>
                <div class="notes-block">
                  <div class="lined-row">
                    <span class="lined-label">Diagnosis</span>
                    <span class="lined-value" id="fieldDiagnosis"></span>
                  </div>
                </div>
              </div>
            </section>

            <div class="stamp">
              <div class="signature"></div>
              <p>Diagnosis determined</p>
            </div>
          </section>

          <section class="page right-page">
            <div class="symptoms-paper" aria-hidden="true"></div>
            <div class="symptoms-frame" aria-hidden="true"></div>
            <div class="symptoms-panel">
              <h2 class="symptoms-title">Suspected Symptoms</h2>

              <div class="symptoms-scroll" id="symptomsScroll"></div>
            </div>
          </section>
        </main>

        <aside class="diagnoses-panel" aria-label="Diagnoses">
          <div class="diagnoses-panel-inner">
            <h2 class="diagnoses-title">Diagnoses</h2>
            <div class="diagnoses-scroll col" id="diagnosesScroll"></div>
            <button class="diagnosis-lock-button">
              <span class="diagnosis-lock-key">X</span>
              <span>Lock in diagnosis</span>
            </button>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div class="diagnosis-detail-modal" id="diagnosisDetailModal">
    <div class="diagnosis-detail-backdrop" data-close-diagnosis-detail></div>
    <div class="diagnosis-detail-dialog">
      <div class="diagnosis-detail-layout">
        <div class="diagnosis-detail-cards count-0" id="diagnosisDetailCards"></div>

        <div class="diagnosis-detail-copy">
          <button class="diagnosis-detail-close" type="button" data-close-diagnosis-detail>
            ×
          </button>

          <h2 class="diagnosis-detail-title" id="diagnosisDetailTitle"></h2>
          <div class="diagnosis-detail-groups" id="diagnosisDetailGroups"></div>
          <div class="diagnosis-detail-text" id="diagnosisDetailText"></div>
        </div>
      </div>
    </div>
  </div>


  <script>
    preloadImagesWithLoading(imageFiles).then(() => {
      console.log("All preload attempts finished");
      document.querySelector(".loading").style.display = "none";
      document.querySelector(".vignette").style.display = "";
      document.querySelector(".background").style.display = "";
      document.querySelector(".app").style.display = "flex";
    });
  </script>
